<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Navbar</title>

<style>

/* Navbar */
.navbar {
    background-color: black;
    padding: 20px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Logo */
.logo {
    color: white;
    font-size: 28px;
    font-weight: bold;
}

/* Nav Links */
.nav-links {
    display: flex;
    gap: 25px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 20px;
}

/* Media Query */
@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        gap: 20px;
    }

    .nav-links {
        flex-direction: column;
        align-items: center;
    }

}

</style>
</head>

<body>

<div class="navbar">

    <!-- Logo -->
    <div class="logo">
        MyLogo
    </div>

    <!-- Navigation Links -->
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

</div>

</body>
</html>
